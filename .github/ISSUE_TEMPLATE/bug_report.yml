name: Bug report
description: Report a defect or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report. Please fill in as much detail
        as you can. Reproduction steps matter most.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A numbered list of steps that reliably triggers the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Tag or commit SHA where you observed this.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, toolchain version, hardware (device model if applicable).
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Attach any relevant output.
      render: text
    validations:
      required: false
