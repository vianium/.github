name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Large feature requests benefit from up-front discussion. Consider
        opening a Discussion in vianium-docs before writing code.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you solve it? Be concrete.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed against the proposal.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits? Any backwards-compatibility concerns?
    validations:
      required: false
